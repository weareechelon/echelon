<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads — Echelon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
body { background: #f9fafb; height: 100vh; display: flex; overflow: hidden; }

/* Sidebar */
.sidebar { width: 64px; background: white; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 4px; flex-shrink: 0; }
.sidebar-logo { width: 40px; height: 40px; background: #4f46e5; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; color: white; font-weight: 700; font-size: 14px; }
.nav-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #9ca3af; cursor: pointer; transition: all .15s; border: none; background: none; }
.nav-icon:hover { background: #f3f4f6; color: #374151; }
.nav-icon.active { background: #eef2ff; color: #4f46e5; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar */
.topbar { background: white; border-bottom: 1px solid #e5e7eb; padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar h1 { font-size: 1.05rem; font-weight: 600; color: #111827; white-space: nowrap; }
.search-wrap { flex: 1; max-width: 420px; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
.search-input { width: 100%; padding: 7px 12px 7px 34px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.84rem; outline: none; }
.search-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
.topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; font-size: 0.84rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: background .15s; border: none; white-space: nowrap; }
.btn-primary { background: #4f46e5; color: white; }
.btn-primary:hover { background: #4338ca; }
.btn-secondary { background: white; color: #374151; border: 1px solid #d1d5db; }
.btn-secondary:hover { background: #f9fafb; }
.btn-ghost { background: none; border: none; color: #6b7280; padding: 6px 8px; }
.btn-ghost:hover { background: #f3f4f6; color: #374151; }

/* Filter panel */
.filter-panel { background: white; border-bottom: 1px solid #e5e7eb; padding: 12px 24px; display: none; }
.filter-row { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
.filter-group label { display: block; font-size: 0.7rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }

/* Form elements */
.form-input { padding: 7px 11px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.84rem; outline: none; font-family: inherit; width: 100%; }
.form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
.form-label { display: block; font-size: 0.7rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
select.form-input { min-width: 130px; width: auto; }

/* Bulk bar */
.bulk-bar { background: #4f46e5; padding: 9px 24px; display: none; align-items: center; gap: 16px; flex-shrink: 0; }
.bulk-bar span { color: white; font-size: .84rem; font-weight: 500; }
.bulk-bar button { background: none; border: none; cursor: pointer; font-size: .84rem; font-weight: 500; }

/* Table */
.table-wrap { flex: 1; overflow: auto; }
table { min-width: 100%; border-collapse: collapse; }
thead { background: #f9fafb; position: sticky; top: 0; z-index: 5; }
.th { padding: 11px 14px; text-align: left; font-size: .7rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; cursor: pointer; user-select: none; white-space: nowrap; border-bottom: 1px solid #e5e7eb; }
.th:hover { background: #f3f4f6; }
.th.hidden-col { display: none; }
.td { padding: 11px 14px; font-size: .84rem; color: #374151; white-space: nowrap; border-bottom: 1px solid #f3f4f6; }
.td.hidden-col { display: none; }
tr:hover .td { background: #fafafa; }
tr.sel .td { background: #eef2ff !important; }

/* Truncate */
.trunc { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: .7rem; font-weight: 500; white-space: nowrap; cursor: pointer; }

/* Pagination */
.pagination { background: white; border-top: 1px solid #e5e7eb; padding: 11px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.page-btn { padding: 5px 10px; font-size: .8rem; border: 1px solid #d1d5db; border-radius: 6px; background: white; cursor: pointer; }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }
.page-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }

/* Empty state */
.empty { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; }

/* Modal overlay */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; }

/* Slide panel (right) */
.slide-panel { position: fixed; top: 0; right: -520px; width: 520px; height: 100vh; background: white; box-shadow: -4px 0 24px rgba(0,0,0,.12); z-index: 110; transition: right .25s ease; display: flex; flex-direction: column; overflow: hidden; }
.slide-panel.open { right: 0; }
.panel-header { padding: 18px 22px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.panel-header h2 { font-size: 1rem; font-weight: 600; color: #111827; }
.panel-body { flex: 1; overflow-y: auto; padding: 22px; }

/* Add/Edit modal panel */
.modal-panel { position: fixed; top: 0; right: 0; width: 480px; height: 100vh; background: white; box-shadow: -4px 0 24px rgba(0,0,0,.12); z-index: 120; display: flex; flex-direction: column; overflow: hidden; }

/* CSV Mapper modal */
.mapper-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 14px; width: 90%; max-width: 760px; max-height: 88vh; display: flex; flex-direction: column; z-index: 130; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; }
.mapper-header { padding: 20px 24px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
.mapper-body { flex: 1; overflow-y: auto; padding: 0; }
.mapper-footer { padding: 16px 24px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
.map-row { display: grid; grid-template-columns: 1fr 30px 1fr; align-items: center; gap: 12px; padding: 10px 24px; border-bottom: 1px solid #f3f4f6; }
.map-row:hover { background: #fafafa; }
.csv-col { font-size: .84rem; color: #111827; font-weight: 500; }
.csv-sample { font-size: .72rem; color: #9ca3af; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; }

/* Column visibility dropdown */
.col-dropdown { position: relative; }
.col-menu { position: absolute; right: 0; top: calc(100% + 6px); background: white; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.1); padding: 8px 0; z-index: 50; min-width: 200px; display: none; }
.col-menu.open { display: block; }
.col-menu-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; font-size: .84rem; color: #374151; cursor: pointer; }
.col-menu-item:hover { background: #f9fafb; }
.col-menu-item input { accent-color: #4f46e5; width: 15px; height: 15px; cursor: pointer; }

/* Detail panel info grid */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.info-item label { font-size: .7rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 4px; }
.info-item span { font-size: .88rem; color: #111827; word-break: break-word; }
.notes-block { background: #f9fafb; border-radius: 8px; padding: 14px; font-size: .84rem; color: #374151; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

/* Status inline dropdown */
.status-dropdown { position: fixed; background: white; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 200; padding: 6px 0; min-width: 160px; }
.status-option { padding: 7px 14px; font-size: .84rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.status-option:hover { background: #f9fafb; }

/* Loading */
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.8); z-index: 300; align-items: center; justify-content: center; }
.spinner { width: 26px; height: 26px; border: 2.5px solid #4f46e5; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }

/* Toast */
.toast { display: none; position: fixed; bottom: 24px; right: 24px; z-index: 400; padding: 11px 18px; border-radius: 10px; font-size: .84rem; color: white; box-shadow: 0 4px 20px rgba(0,0,0,.15); max-width: 320px; }

@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #f1f1f1; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">E</div>
    <button class="nav-icon active" title="People" onclick="activateNav(this)">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>
    <button class="nav-icon" title="Companies" onclick="activateNav(this)">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 00-1-1h-2a1 1 0 00-1 1v5m4 0H9"/></svg>
    </button>
    <button class="nav-icon" title="Sequences" onclick="activateNav(this)">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
    </button>
    <button class="nav-icon" title="Tasks" onclick="activateNav(this)">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
    </button>
    <button class="nav-icon" title="Analytics" onclick="activateNav(this)">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    </button>
    <div style="flex:1"></div>
    <button class="nav-icon" title="Settings">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <h1>People</h1>
        <div class="search-wrap">
            <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search people, company, email..." oninput="handleSearch()">
        </div>
        <div class="topbar-actions">
            <button class="btn btn-secondary" onclick="toggleFilters()">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
                Filters
            </button>
            <!-- Column visibility -->
            <div class="col-dropdown">
                <button class="btn btn-secondary" onclick="toggleColMenu(event)">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
                    Columns
                </button>
                <div class="col-menu" id="colMenu"></div>
            </div>
            <label class="btn btn-secondary" style="cursor:pointer;">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                Import CSV
                <input type="file" accept=".csv" style="display:none" onchange="handleCSVFile(event)">
            </label>
            <button class="btn btn-secondary" onclick="exportCSV()">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                Export
            </button>
            <button class="btn btn-primary" onclick="openAddModal()">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add Lead
            </button>
        </div>
    </div>

    <!-- FILTER PANEL -->
    <div class="filter-panel" id="filterPanel">
        <div class="filter-row">
            <div class="filter-group">
                <label>Status</label>
                <select class="form-input" id="fStatus" onchange="applyFilters()">
                    <option value="">All Statuses</option>
                    <option>New</option><option>Contacted</option><option>Engaged</option>
                    <option>Meeting Set</option><option>Qualified</option>
                    <option>Not Interested</option><option>Won</option><option>Lost</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Owner</label>
                <select class="form-input" id="fOwner" onchange="applyFilters()">
                    <option value="">All Owners</option>
                    <option>Rc</option><option>Josh</option><option>Lauren</option><option>Chanel</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Source</label>
                <select class="form-input" id="fSource" onchange="applyFilters()">
                    <option value="">All Sources</option>
                    <option>Alignable</option><option>Facebook</option><option>LinkedIn</option>
                    <option>Instagram</option><option>Referral</option><option>Website</option><option>Other</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Industry</label>
                <select class="form-input" id="fIndustry" onchange="applyFilters()">
                    <option value="">All Industries</option>
                </select>
            </div>
            <button class="btn btn-ghost" onclick="clearFilters()" style="padding:7px 10px; font-size:.8rem; color:#4f46e5;">Clear all</button>
        </div>
    </div>

    <!-- BULK ACTION BAR -->
    <div class="bulk-bar" id="bulkBar">
        <span id="bulkCount"></span>
        <button onclick="bulkChangeStatus()" style="color:#e0e7ff;">Change Status</button>
        <button onclick="bulkDelete()" style="color:#fca5a5;">Delete</button>
        <button onclick="exportCSV()" style="color:#e0e7ff;">Export</button>
        <div style="margin-left:auto">
            <button onclick="clearSelection()" style="color:rgba(255,255,255,.7); font-size:.8rem;">✕ Clear</button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap" id="tableWrap">
        <table id="leadsTable">
            <thead>
                <tr id="tableHead">
                    <th class="th" style="width:40px; cursor:default;">
                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" style="accent-color:#4f46e5; cursor:pointer;">
                    </th>
                    <th class="th" data-col="name" onclick="sortBy('first_name')">Name <span id="sort_first_name"></span></th>
                    <th class="th" data-col="title" onclick="sortBy('title')">Title <span id="sort_title"></span></th>
                    <th class="th" data-col="company" onclick="sortBy('company')">Company <span id="sort_company"></span></th>
                    <th class="th" data-col="email" onclick="sortBy('email')">Email <span id="sort_email"></span></th>
                    <th class="th" data-col="phone" onclick="sortBy('phone')">Phone <span id="sort_phone"></span></th>
                    <th class="th" data-col="status" onclick="sortBy('status')">Status <span id="sort_status"></span></th>
                    <th class="th" data-col="owner" onclick="sortBy('owner')">Owner <span id="sort_owner"></span></th>
                    <th class="th" data-col="source" onclick="sortBy('source')">Source <span id="sort_source"></span></th>
                    <th class="th" data-col="industry" onclick="sortBy('industry')">Industry <span id="sort_industry"></span></th>
                    <th class="th" data-col="location" onclick="sortBy('city')">Location <span id="sort_city"></span></th>
                    <th class="th" data-col="linkedin_url" onclick="sortBy('linkedin_url')">LinkedIn <span id="sort_linkedin_url"></span></th>
                    <th class="th" data-col="num_employees" onclick="sortBy('num_employees')"># Employees <span id="sort_num_employees"></span></th>
                    <th class="th" data-col="last_activity_date" onclick="sortBy('last_activity_date')">Last Activity <span id="sort_last_activity_date"></span></th>
                    <th class="th" data-col="created_at" onclick="sortBy('created_at')">Date Added <span id="sort_created_at"></span></th>
                    <th class="th" data-col="tags">Tags</th>
                    <th class="th" data-col="actions" style="cursor:default;">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody" style="background:white;"></tbody>
        </table>
        <div class="empty" id="emptyState">
            <svg width="48" height="48" fill="none" stroke="#d1d5db" viewBox="0 0 24 24" style="margin-bottom:14px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <p style="color:#6b7280; font-size:.9rem; font-weight:500;">No leads found</p>
            <p style="color:#9ca3af; font-size:.8rem; margin-top:4px;">Add your first lead or adjust your filters</p>
            <button class="btn btn-primary" onclick="openAddModal()" style="margin-top:16px;">Add Lead</button>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:.8rem; color:#6b7280;">Show</span>
            <select class="form-input" id="pageSize" onchange="changePageSize()" style="width:auto; padding:4px 8px; font-size:.8rem;">
                <option value="25">25</option><option value="50">50</option><option value="100">100</option>
            </select>
            <span style="font-size:.8rem; color:#6b7280;">per page</span>
        </div>
        <span id="paginationInfo" style="font-size:.8rem; color:#6b7280;"></span>
        <div style="display:flex; align-items:center; gap:4px;">
            <button class="page-btn" onclick="prevPage()" id="prevBtn" disabled>Previous</button>
            <div id="pageNumbers" style="display:flex; gap:4px;"></div>
            <button class="page-btn" onclick="nextPage()" id="nextBtn" disabled>Next</button>
        </div>
    </div>
</div>

<script>
// ================================================================
// CONFIG
// ================================================================
const SUPABASE_URL = 'https://ztnlacrlnzmazfbwqfzs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_K2tRmbLW7tvKLfejs8LXQg_vRhUrm8w';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================================================================
// STATE
// ================================================================
let allLeads = [], filteredLeads = [];
let selectedIds = new Set();
let currentPage = 1, pageSize = 25;
let sortField = 'created_at', sortDir = 'desc';
let searchQuery = '';
let pendingCSVRows = [], pendingCSVHeaders = [], pendingCSVSamples = [];
let csvFileInput = null;
let editingLeadId = null; // tracks which lead is being edited (never rely on hidden input alone)

// Column visibility (persisted)
const ALL_COLS = ['name','title','company','email','phone','status','owner','source','industry','location','linkedin_url','num_employees','last_activity_date','created_at','tags','actions'];
const COL_LABELS = { name:'Name', title:'Title', company:'Company', email:'Email', phone:'Phone', status:'Status', owner:'Owner', source:'Source', industry:'Industry', location:'Location', linkedin_url:'LinkedIn', num_employees:'# Employees', last_activity_date:'Last Activity', created_at:'Date Added', tags:'Tags', actions:'Actions' };
let hiddenCols = new Set(JSON.parse(localStorage.getItem('echelon_hidden_cols') || '[]'));

// DB fields for mapping
const DB_FIELDS = [
    { value: '',                  label: '— Skip —' },
    { value: 'full_name',         label: 'Full Name (auto-split first/last)' },
    { value: 'first_name',        label: 'First Name' },
    { value: 'last_name',         label: 'Last Name' },
    { value: 'title',             label: 'Job Title' },
    { value: 'company',           label: 'Company' },
    { value: 'email',             label: 'Email' },
    { value: 'phone',             label: 'Phone' },
    { value: 'linkedin_url',      label: 'LinkedIn URL' },
    { value: 'city',              label: 'City' },
    { value: 'state',             label: 'State' },
    { value: 'country',           label: 'Country' },
    { value: 'industry',          label: 'Industry' },
    { value: 'num_employees',     label: '# Employees' },
    { value: 'status',            label: 'Status' },
    { value: 'owner',             label: 'Owner' },
    { value: 'source',            label: 'Source' },
    { value: 'tags',              label: 'Tags' },
    { value: 'notes',             label: 'Notes' },
    { value: 'last_activity_date',label: 'Last Activity Date' },
];
const STATUSES = ['New','Contacted','Engaged','Meeting Set','Qualified','Not Interested','Won','Lost'];
const FORM_FIELDS = ['first_name','last_name','title','company','email','phone','linkedin_url','city','state','country','industry','num_employees','status','owner','source','tags','notes'];

// ================================================================
// INIT
// ================================================================
async function init() {
    buildColMenu();
    applyColVisibility();
    showLoading(true, 'Loading leads...');
    await fetchLeads();
    showLoading(false);
    document.addEventListener('click', globalClickHandler);
}

// ================================================================
// SUPABASE CRUD
// ================================================================
async function fetchLeads() {
    const { data, error } = await db.from('leads').select('*').order(sortField, { ascending: sortDir === 'asc' });
    if (error) { showToast('Error loading: ' + error.message, 'error'); return; }
    allLeads = data || [];
    populateIndustryFilter();
    applyFilters();
}

async function createLead(lead) {
    const { data, error } = await db.from('leads').insert([lead]).select().single();
    if (error) { showToast('Error: ' + error.message, 'error'); return null; }
    return data;
}

async function updateLead(id, lead) {
    const { data, error } = await db.from('leads').update({ ...lead, updated_at: new Date().toISOString() }).eq('id', id).select().single();
    if (error) { showToast('Error: ' + error.message, 'error'); return null; }
    return data;
}

async function deleteLead(id) {
    const { error } = await db.from('leads').delete().eq('id', id);
    if (error) { showToast('Error: ' + error.message, 'error'); return false; }
    return true;
}

async function deleteLeads(ids) {
    const { error } = await db.from('leads').delete().in('id', ids);
    if (error) { showToast('Error: ' + error.message, 'error'); return false; }
    return true;
}

// ================================================================
// SEARCH & FILTER
// ================================================================
function handleSearch() {
    searchQuery = document.getElementById('searchInput').value.toLowerCase();
    currentPage = 1;
    applyFilters();
}

function applyFilters() {
    const fS = document.getElementById('fStatus').value;
    const fO = document.getElementById('fOwner').value;
    const fSrc = document.getElementById('fSource').value;
    const fI = document.getElementById('fIndustry').value;
    filteredLeads = allLeads.filter(l => {
        const q = searchQuery;
        const matchQ = !q || [l.first_name,l.last_name,l.email,l.company,l.title,l.city,l.industry,l.tags,l.notes,l.phone]
            .some(v => v && v.toLowerCase().includes(q));
        return matchQ && (!fS||l.status===fS) && (!fO||l.owner===fO) && (!fSrc||l.source===fSrc) && (!fI||l.industry===fI);
    });
    currentPage = 1;
    renderTable();
    renderPagination();
}

function clearFilters() {
    ['fStatus','fOwner','fSource','fIndustry'].forEach(id => { document.getElementById(id).value = ''; });
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    applyFilters();
}

function toggleFilters() {
    const p = document.getElementById('filterPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function populateIndustryFilter() {
    const industries = [...new Set(allLeads.map(l=>l.industry).filter(Boolean))].sort();
    const sel = document.getElementById('fIndustry');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All Industries</option>';
    industries.forEach(i => { const o = document.createElement('option'); o.value=i; o.textContent=i; if(i===cur) o.selected=true; sel.appendChild(o); });
}

// ================================================================
// SORT
// ================================================================
function sortBy(field) {
    sortDir = sortField === field ? (sortDir==='asc'?'desc':'asc') : 'asc';
    sortField = field;
    document.querySelectorAll('[id^="sort_"]').forEach(el => el.textContent='');
    const el = document.getElementById('sort_'+field);
    if (el) el.textContent = sortDir==='asc' ? ' ↑' : ' ↓';
    filteredLeads.sort((a,b) => { const av=String(a[field]||''), bv=String(b[field]||''); return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av); });
    renderTable();
    renderPagination();
}

// ================================================================
// COLUMN VISIBILITY
// ================================================================
function buildColMenu() {
    const menu = document.getElementById('colMenu');
    menu.innerHTML = ALL_COLS.map(c => `
        <label class="col-menu-item">
            <input type="checkbox" ${!hiddenCols.has(c)?'checked':''} onchange="toggleCol('${c}',this.checked)">
            ${COL_LABELS[c]}
        </label>`).join('');
}

function toggleCol(col, visible) {
    if (visible) hiddenCols.delete(col); else hiddenCols.add(col);
    localStorage.setItem('echelon_hidden_cols', JSON.stringify([...hiddenCols]));
    applyColVisibility();
    renderTable();
}

function applyColVisibility() {
    document.querySelectorAll('[data-col]').forEach(el => {
        const col = el.dataset.col;
        el.classList.toggle('hidden-col', hiddenCols.has(col));
    });
}

function toggleColMenu(e) {
    e.stopPropagation();
    document.getElementById('colMenu').classList.toggle('open');
}

// ================================================================
// RENDER TABLE
// ================================================================
function renderTable() {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');
    const start = (currentPage-1)*pageSize;
    const page = filteredLeads.slice(start, start+pageSize);

    if (!filteredLeads.length) { tbody.innerHTML=''; empty.style.display='flex'; return; }
    empty.style.display='none';

    tbody.innerHTML = page.map(l => {
        const name = [l.first_name,l.last_name].filter(Boolean).join(' ') || '—';
        const initials = [(l.first_name||'')[0],(l.last_name||'')[0]].filter(Boolean).join('').toUpperCase()||'?';
        const loc = [l.city,l.state,l.country].filter(Boolean).join(', ')||'—';
        const sel = selectedIds.has(l.id);
        const hc = col => hiddenCols.has(col) ? 'hidden-col' : '';
        return `<tr id="row-${l.id}" class="${sel?'sel':''}" style="cursor:default;">
            <td class="td" style="width:40px;">
                <input type="checkbox" ${sel?'checked':''} onchange="toggleRow('${l.id}',this.checked)" onclick="event.stopPropagation()" style="accent-color:#4f46e5; cursor:pointer; width:15px; height:15px;">
            </td>
            <td class="td ${hc('name')}">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:#eef2ff; color:#4f46e5; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0;">${esc(initials)}</div>
                    <span style="font-weight:500; color:#111827; cursor:pointer; text-decoration:none;" onmouseover="this.style.color='#4f46e5'" onmouseout="this.style.color='#111827'" onclick="openDetail('${l.id}')">${esc(name)}</span>
                </div>
            </td>
            <td class="td ${hc('title')}"><span class="trunc" title="${esc(l.title)}">${esc(l.title)||'—'}</span></td>
            <td class="td ${hc('company')}"><span class="trunc" style="font-weight:500;" title="${esc(l.company)}">${esc(l.company)||'—'}</span></td>
            <td class="td ${hc('email')}">${l.email?`<a href="mailto:${esc(l.email)}" style="color:#4f46e5; text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${esc(l.email)}</a>`:'—'}</td>
            <td class="td ${hc('phone')}">${esc(l.phone)||'—'}</td>
            <td class="td ${hc('status')}">
                <span class="badge" style="${STATUS_COLORS[l.status]||'background:#f3f4f6;color:#6b7280;'}" onclick="openStatusDropdown(event,'${l.id}')" title="Click to change status">${esc(l.status)||'—'}</span>
            </td>
            <td class="td ${hc('owner')}">${ownerBadge(l.owner)}</td>
            <td class="td ${hc('source')}">${sourceBadge(l.source)}</td>
            <td class="td ${hc('industry')}"><span class="trunc" title="${esc(l.industry)}">${esc(l.industry)||'—'}</span></td>
            <td class="td ${hc('location')}"><span class="trunc" title="${loc}">${esc(loc)}</span></td>
            <td class="td ${hc('linkedin_url')}">${l.linkedin_url?`<a href="${esc(l.linkedin_url)}" target="_blank" style="color:#4f46e5; font-size:.76rem; text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View ↗</a>`:'—'}</td>
            <td class="td ${hc('num_employees')}">${esc(l.num_employees)||'—'}</td>
            <td class="td ${hc('last_activity_date')}" style="color:#9ca3af; font-size:.76rem;">${fmtDate(l.last_activity_date)}</td>
            <td class="td ${hc('created_at')}" style="color:#9ca3af; font-size:.76rem;">${fmtDate(l.created_at)}</td>
            <td class="td ${hc('tags')}">
                <div style="display:flex; flex-wrap:wrap; gap:3px;">
                    ${(l.tags||'').split(',').filter(t=>t.trim()).slice(0,3).map(t=>`<span style="background:#f3f4f6; color:#6b7280; padding:2px 7px; border-radius:4px; font-size:.7rem;">${esc(t.trim())}</span>`).join('')}
                </div>
            </td>
            <td class="td ${hc('actions')}">
                <div style="display:flex; gap:10px;">
                    <button onclick="openEditModal('${l.id}')" title="Edit" style="background:none; border:none; cursor:pointer; color:#9ca3af; padding:0;" onmouseover="this.style.color='#4f46e5'" onmouseout="this.style.color='#9ca3af'">
                        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </button>
                    <button onclick="confirmDelete('${l.id}')" title="Delete" style="background:none; border:none; cursor:pointer; color:#9ca3af; padding:0;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#9ca3af'">
                        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');

    document.getElementById('selectAll').checked = page.length > 0 && page.every(l => selectedIds.has(l.id));
}

// ================================================================
// BADGES & HELPERS
// ================================================================
const STATUS_COLORS = {
    'New':            'background:#dbeafe; color:#1d4ed8;',
    'Contacted':      'background:#fef9c3; color:#92400e;',
    'Engaged':        'background:#ede9fe; color:#6d28d9;',
    'Meeting Set':    'background:#e0e7ff; color:#3730a3;',
    'Qualified':      'background:#dcfce7; color:#166534;',
    'Not Interested': 'background:#f3f4f6; color:#6b7280;',
    'Won':            'background:#d1fae5; color:#065f46;',
    'Lost':           'background:#fee2e2; color:#991b1b;',
};
const OWNER_COLORS = { 'Rc':'background:#fce7f3;color:#9d174d;', 'Josh':'background:#dbeafe;color:#1e40af;', 'Lauren':'background:#f3e8ff;color:#6b21a8;', 'Chanel':'background:#ffedd5;color:#9a3412;' };
const SOURCE_COLORS = { 'Alignable':'background:#ccfbf1;color:#0f766e;', 'Facebook':'background:#dbeafe;color:#1d4ed8;', 'LinkedIn':'background:#e0f2fe;color:#0369a1;', 'Instagram':'background:#fce7f3;color:#be185d;', 'Referral':'background:#fef3c7;color:#92400e;' };

function ownerBadge(o)  { return o ? `<span class="badge" style="${OWNER_COLORS[o]||'background:#f3f4f6;color:#6b7280;'}">${esc(o)}</span>` : '—'; }
function sourceBadge(s) { return s ? `<span class="badge" style="${SOURCE_COLORS[s]||'background:#f3f4f6;color:#6b7280;'}">${esc(s)}</span>` : '—'; }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ================================================================
// INLINE STATUS EDIT
// ================================================================
function openStatusDropdown(e, leadId) {
    e.stopPropagation();
    const dd = document.getElementById('statusDropdown');
    const rect = e.target.getBoundingClientRect();
    dd.innerHTML = STATUSES.map(s => {
        const color = STATUS_COLORS[s] || 'background:#f3f4f6;color:#6b7280;';
        return `<div class="status-option" onclick="setStatus('${leadId}','${s}')">
            <span class="badge" style="${color}">${s}</span>
        </div>`;
    }).join('');
    dd.style.display = 'block';
    dd.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    dd.style.left = rect.left + 'px';
}

async function setStatus(id, status) {
    document.getElementById('statusDropdown').style.display = 'none';
    const updated = await updateLead(id, { status, last_activity_date: new Date().toISOString() });
    if (updated) {
        const i = allLeads.findIndex(l => l.id === id);
        if (i !== -1) allLeads[i] = { ...allLeads[i], status, last_activity_date: updated.last_activity_date };
        applyFilters();
        showToast(`Status → ${status}`);
    }
}

// ================================================================
function openAddModal() {
    editingLeadId = null;
    document.getElementById('modalTitle').textContent = 'Add Lead';
    document.getElementById('leadId').value = '';
    document.getElementById('leadForm').reset();
    document.getElementById('modalOverlay').style.display = 'block';
    document.getElementById('modalPanel').style.display = 'flex';
}

function openEditModal(id) {
    const l = allLeads.find(x => x.id === id);
    if (!l) return;
    editingLeadId = id;
    document.getElementById('modalTitle').textContent = 'Edit Lead';
    document.getElementById('leadId').value = id;
    FORM_FIELDS.forEach(f => { const el = document.getElementById('f_'+f); if(el) el.value = l[f]||''; });
    document.getElementById('modalOverlay').style.display = 'block';
    document.getElementById('modalPanel').style.display = 'flex';
}

function closeModal() {
    editingLeadId = null;
    document.getElementById('modalOverlay').style.display = 'none';
    document.getElementById('modalPanel').style.display = 'none';
}

async function handleFormSubmit(e) {
    e.preventDefault();
    const id = editingLeadId; // use JS variable, not the hidden input
    const lead = {};
    FORM_FIELDS.forEach(f => { lead[f] = document.getElementById('f_'+f).value || null; });
    lead.last_activity_date = new Date().toISOString();

    showLoading(true);
    if (id) {
        const updated = await updateLead(id, lead);
        if (updated) { const i = allLeads.findIndex(x=>x.id===id); if(i!==-1) allLeads[i]={...allLeads[i],...updated}; showToast('Lead updated'); }
    } else {
        const created = await createLead(lead);
        if (created) { allLeads.unshift(created); showToast('Lead added'); }
    }
    showLoading(false);
    closeModal();
    populateIndustryFilter();
    applyFilters();
}

// ================================================================
// DELETE
// ================================================================
async function confirmDelete(id) {
    if (!confirm('Delete this lead? This cannot be undone.')) return;
    showLoading(true);
    if (await deleteLead(id)) {
        allLeads = allLeads.filter(l => l.id !== id);
        selectedIds.delete(id);
        applyFilters();
        updateBulkBar();
        showToast('Lead deleted');
    }
    showLoading(false);
}

async function bulkDelete() {
    if (!selectedIds.size || !confirm(`Delete ${selectedIds.size} lead(s)? Cannot be undone.`)) return;
    showLoading(true);
    const ids = [...selectedIds];
    if (await deleteLeads(ids)) {
        allLeads = allLeads.filter(l => !ids.includes(l.id));
        selectedIds.clear();
        applyFilters();
        updateBulkBar();
        showToast(`${ids.length} leads deleted`);
    }
    showLoading(false);
}

// ================================================================
function bulkChangeStatus() {
    const dd = document.getElementById('bulkStatusDropdown');
    const btn = document.getElementById('bulkBar').querySelector('button');
    const rect = btn.getBoundingClientRect();
    dd.innerHTML = `<div style="padding:6px 14px 4px; font-size:.72rem; font-weight:600; color:#9ca3af; text-transform:uppercase; letter-spacing:.05em;">Change status to</div>` +
        STATUSES.map(s => `<div class="status-option" onclick="applyBulkStatus('${s}')"><span class="badge" style="${STATUS_COLORS[s]||'background:#f3f4f6;color:#6b7280;'}">${s}</span></div>`).join('');
    dd.style.display = 'block';

async function applyBulkStatus(status) {
    document.getElementById('bulkStatusDropdown').style.display = 'none';
    if (!selectedIds.size) return;
    showLoading(true, `Updating ${selectedIds.size} leads...`);
    const ids = [...selectedIds];
    const { error } = await db.from('leads').update({ status, last_activity_date: new Date().toISOString() }).in('id', ids);
    if (!error) {
        ids.forEach(id => { const i = allLeads.findIndex(l=>l.id===id); if(i!==-1) allLeads[i].status=status; });
        showToast(`${ids.length} leads → ${status}`);
        applyFilters();
    } else {
        showToast('Error: ' + error.message, 'error');
    }
    showLoading(false);
}

// SELECTION

function toggleRow(id, checked) {
    checked ? selectedIds.add(id) : selectedIds.delete(id);
    const row = document.getElementById('row-'+id);
    if (row) { checked ? row.classList.add('sel') : row.classList.remove('sel'); }

}

function toggleSelectAll() {
    const checked = document.getElementById('selectAll').checked;
    const start = (currentPage-1)*pageSize;
    filteredLeads.slice(start, start+pageSize).forEach(l => { checked ? selectedIds.add(l.id) : selectedIds.delete(l.id); });
    renderTable();
    updateBulkBar();
}

function clearSelection() { selectedIds.clear(); renderTable(); updateBulkBar(); }

function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    if (selectedIds.size > 0) { bar.style.display='flex'; document.getElementById('bulkCount').textContent=`${selectedIds.size} selected`; }
    else { bar.style.display='none'; }
}

// ================================================================
// PAGINATION
// ================================================================
function renderPagination() {
    const total = filteredLeads.length;
    const totalPages = Math.ceil(total/pageSize)||1;
    const start = total===0?0:(currentPage-1)*pageSize+1;
    const end = Math.min(currentPage*pageSize, total);
    document.getElementById('paginationInfo').textContent = total===0 ? 'No results' : `${start.toLocaleString()}–${end.toLocaleString()} of ${total.toLocaleString()}`;
    document.getElementById('prevBtn').disabled = currentPage<=1;
    document.getElementById('nextBtn').disabled = currentPage>=totalPages;
    const pn = document.getElementById('pageNumbers');
    pn.innerHTML = '';
    getPages(currentPage,totalPages).forEach(p => {
        if (p==='…') { pn.innerHTML+=`<span style="padding:0 4px; color:#9ca3af; font-size:.8rem;">…</span>`; }
        else { const a=p===currentPage; pn.innerHTML+=`<button onclick="goToPage(${p})" class="page-btn ${a?'active':''}">${p}</button>`; }
    });
}

function getPages(c,t) {
    if(t<=7) return Array.from({length:t},(_,i)=>i+1);
    if(c<=4) return [1,2,3,4,5,'…',t];
    if(c>=t-3) return [1,'…',t-4,t-3,t-2,t-1,t];
    return [1,'…',c-1,c,c+1,'…',t];
}

function prevPage() { if(currentPage>1){currentPage--;renderTable();renderPagination();} }
function nextPage() { if(currentPage<Math.ceil(filteredLeads.length/pageSize)){currentPage++;renderTable();renderPagination();} }
function goToPage(p) { currentPage=p; renderTable(); renderPagination(); }
function changePageSize() { pageSize=parseInt(document.getElementById('pageSize').value); currentPage=1; renderTable(); renderPagination(); }

// ================================================================
// EXPORT CSV
// ================================================================
const EXPORT_FIELDS = ['first_name','last_name','title','company','email','phone','linkedin_url','city','state','country','industry','num_employees','status','owner','source','tags','notes','last_activity_date','created_at'];

function exportCSV() {
    const leads = selectedIds.size>0 ? allLeads.filter(l=>selectedIds.has(l.id)) : filteredLeads;
    if (!leads.length) { showToast('Nothing to export','error'); return; }
    const rows = leads.map(l => EXPORT_FIELDS.map(f=>`"${String(l[f]||'').replace(/"/g,'""')}"`).join(','));
    const csv = [EXPORT_FIELDS.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = 'echelon-leads.csv';
    a.click();
    showToast(`Exported ${leads.length} leads`);
}

// ================================================================
// CSV PARSER — RFC 4180 compliant (handles quotes, newlines, BOM)
// ================================================================
function parseCSV(text) {
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    const rows = [];
    let i = 0, n = text.length;
    while (i < n) {
        const row = [];
        while (i < n) {
            if (text[i] === '"') {
                let field = ''; i++;
                while (i < n) {
                    if (text[i]==='"' && text[i+1]==='"') { field+='"'; i+=2; }
                    else if (text[i]==='"') { i++; break; }
                    else field += text[i++];
                }
                row.push(field);
            } else {
                let field = '';
                while (i < n && text[i]!==',' && text[i]!=='\n') field += text[i++];
                row.push(field.trim());
            }
            if (i < n && text[i]===',') { i++; continue; }
            break;
        }
        if (i < n && text[i]==='\n') i++;
        if (row.length && row.some(v=>v)) rows.push(row);
    }
    return rows;
}

// ================================================================
// CSV IMPORT — FILE HANDLER + COLUMN MAPPER
// ================================================================
function handleCSVFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    event.target.value = '';
    const reader = new FileReader();
    reader.onload = e => openMapper(e.target.result, file.name);
    reader.readAsText(file);
}

function autoMapField(header) {
    const h = header.toLowerCase().trim();
    if (h==='name'||h==='full name'||h==='full_name'||h==='contact name') return 'full_name';
    if ((h.includes('first')&&h.includes('name'))) return 'first_name';
    if ((h.includes('last')&&h.includes('name'))) return 'last_name';
    if (h.includes('title')||h==='job'||h.includes('position')||h.includes('role')) return 'title';
    if ((h.includes('company')||h.includes('organization')||h.includes('account'))&&!h.includes('desc')&&!h.includes('rev')&&!h.includes('address')&&!h.includes('url')&&!h.includes('website')) return 'company';
    if (h.includes('email')) return 'email';
    if (h.includes('phone')||h.includes('mobile')||h.includes('tel')) return 'phone';
    if (h.includes('linkedin')) return 'linkedin_url';
    if (h.includes('city')) return 'city';
    if (h.includes('state')&&!h.includes('status')) return 'state';
    if (h.includes('country')) return 'country';
    if (h.includes('industry')) return 'industry';
    if (h.includes('employee')||h.includes('headcount')||h==='# employees'||h==='size') return 'num_employees';
    if (h==='status'||h==='lead status'||h==='stage') return 'status';
    if (h.includes('owner')||h.includes('assigned to')||h==='rep') return 'owner';
    if (h.includes('source')||h.includes('how did you find')||h.includes('lead source')) return 'source';
    if (h==='tags'||h.includes('tag')||h==='labels'||h.includes('peer group')) return 'tags';
    if (h.includes('note')||h.includes('call note')||h.includes('comment')) return 'notes';
    if ((h.includes('last')||h.includes('latest'))&&h.includes('date')) return 'last_activity_date';
    return '';
}

function openMapper(text, filename) {
    const rows = parseCSV(text);
    if (rows.length < 2) { showToast('CSV appears empty or invalid','error'); return; }
    const headers = rows[0];
    const dataRows = rows.slice(1);
    pendingCSVHeaders = headers;
    pendingCSVRows = dataRows;
    pendingCSVSamples = dataRows.slice(0,3);

    document.getElementById('mapperSubtitle').textContent = `${dataRows.length.toLocaleString()} rows detected in "${filename}"`;

    const fieldOptions = DB_FIELDS.map(f=>`<option value="${f.value}">${f.label}</option>`).join('');
    document.getElementById('mapperRows').innerHTML = headers.map((h,i) => {
        const mapped = autoMapField(h);
        const samples = pendingCSVSamples.map(r=>r[i]||'').filter(Boolean).slice(0,2).join(' · ');
        const opts = DB_FIELDS.map(f=>`<option value="${f.value}" ${f.value===mapped?'selected':''}>${f.label}</option>`).join('');
        return `<div class="map-row">
            <div>
                <div class="csv-col">${esc(h)}</div>
                ${samples ? `<div class="csv-sample">${esc(samples)}</div>` : ''}
            </div>
            <div style="color:#9ca3af; font-size:.9rem; text-align:center;">→</div>
            <select class="form-input mapper-sel" data-col-index="${i}" style="font-size:.82rem;">${opts}</select>
        </div>`;
    }).join('');

    const importBtn = document.getElementById('mapperImportBtn');
    importBtn.textContent = `Import ${dataRows.length.toLocaleString()} leads`;
    importBtn.style.display = '';
    importBtn.onclick = runImport;
    document.getElementById('dupWarning').style.display = 'none';
    document.getElementById('mapperOverlay').style.display = 'block';
    document.getElementById('mapperBox').style.display = 'flex';
}

function closeMapper() {
    document.getElementById('mapperOverlay').style.display = 'none';
    document.getElementById('mapperBox').style.display = 'none';
    pendingCSVRows = []; pendingCSVHeaders = []; pendingCSVSamples = [];
}

async function runImport() {
    const selects = document.querySelectorAll('.mapper-sel');
    const mapping = {};
    selects.forEach(sel => { if(sel.value) mapping[parseInt(sel.dataset.colIndex)] = sel.value; });

    if (!Object.values(mapping).length) { showToast('Map at least one column','error'); return; }

    const leads = pendingCSVRows.map(row => {
        const lead = {};
        Object.entries(mapping).forEach(([idx, field]) => {
            const val = (row[parseInt(idx)]||'').trim();
            if (!val) return;
            if (field === 'full_name') {
                const parts = val.trim().split(/\s+/);
                lead.first_name = parts[0]||'';
                lead.last_name = parts.slice(1).join(' ')||'';
            } else if (field === 'last_activity_date') {
                const d = new Date(val);
                if (!isNaN(d)) lead.last_activity_date = d.toISOString();
            } else {
                if (lead[field]) lead[field] += ', ' + val;
                else lead[field] = val;
            }
        });
        return lead;
    }).filter(l => l.first_name || l.last_name || l.email || l.company);

    if (!leads.length) { showToast('No valid leads found after mapping','error'); return; }

    // Duplicate check by email
    const emailToId = {};
    allLeads.forEach(l => { if(l.email) emailToId[l.email.toLowerCase()] = l.id; });
    const dupes = leads.filter(l => l.email && emailToId[l.email.toLowerCase()]);

    if (dupes.length) {
        const w = document.getElementById('dupWarning');
        w.innerHTML = `⚠ ${dupes.length} lead(s) match existing emails. How would you like to handle them?
            <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
                <button class="btn btn-primary" style="font-size:.8rem; padding:6px 12px;" onclick="doSmartImport(window._pendingLeads, window._pendingEmailMap)">
                    Update existing + import new
                </button>
                <button class="btn btn-secondary" style="font-size:.8rem; padding:6px 12px;" onclick="doInsert(window._pendingLeads)">
                    Import all as new records
                </button>
            </div>`;
        w.style.display = 'block';
        document.getElementById('mapperImportBtn').style.display = 'none';
        window._pendingLeads = leads;
        window._pendingEmailMap = emailToId;
        return;
    }

    await doInsert(leads);
}

async function doSmartImport(leads, emailToId) {
    closeMapper();
    const toUpdate = leads.filter(l => l.email && emailToId[l.email.toLowerCase()]);
    const toInsert = leads.filter(l => !l.email || !emailToId[l.email.toLowerCase()]);
    let updated = 0, inserted = 0;

    showLoading(true, `Updating ${toUpdate.length} + importing ${toInsert.length} leads...`);

    for (const lead of toUpdate) {
        const id = emailToId[lead.email.toLowerCase()];
        const { error } = await db.from('leads').update({ ...lead, updated_at: new Date().toISOString() }).eq('id', id);
        if (!error) {
            const i = allLeads.findIndex(l => l.id === id);
            if (i !== -1) allLeads[i] = { ...allLeads[i], ...lead };
            updated++;
        }
    }

    if (toInsert.length) {
        const BATCH = 200;
        for (let i=0; i<toInsert.length; i+=BATCH) {
            const { data, error } = await db.from('leads').insert(toInsert.slice(i, i+BATCH)).select();
            if (!error) { allLeads = [...(data||[]), ...allLeads]; inserted += (data||[]).length; }
        }
    }

    showLoading(false);
    populateIndustryFilter();
    applyFilters();
    showToast(`Updated ${updated}, imported ${inserted} leads`);
}

async function doInsert(leads) {
    closeMapper();
    showLoading(true, `Importing ${leads.length} leads...`);
    const BATCH = 200;
    let imported = 0;
    for (let i=0; i<leads.length; i+=BATCH) {
        const batch = leads.slice(i, i+BATCH);
        const { data, error } = await db.from('leads').insert(batch).select();
        if (error) { showToast('Import error: ' + error.message, 'error'); showLoading(false); return; }
        allLeads = [...(data||[]), ...allLeads];
        imported += (data||[]).length;
    }
    showLoading(false);
    populateIndustryFilter();
    applyFilters();
    showToast(`Imported ${imported.toLocaleString()} leads`);
}

// ================================================================
// UI HELPERS
// ================================================================
function showLoading(show, msg='Loading...') {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    if (msg) document.getElementById('loadingMsg').textContent = msg;
}

let toastTimer;
function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type==='error' ? '#dc2626' : '#111827';
    t.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{ t.style.display='none'; }, 3500);
}

function activateNav(el) {
    document.querySelectorAll('.nav-icon').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
}

function globalClickHandler(e) {
    if (!e.target.closest('.col-dropdown')) document.getElementById('colMenu').classList.remove('open');
    if (!e.target.closest('.badge') && !e.target.closest('#statusDropdown')) document.getElementById('statusDropdown').style.display='none';
    if (!e.target.closest('#bulkBar') && !e.target.closest('#bulkStatusDropdown')) document.getElementById('bulkStatusDropdown').style.display='none';
}
