<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" fill="none">
  <!-- Staircase bars, bottom-aligned -->
  <rect x="0"  y="30" width="7" height="12" rx="2" fill="#D4AF37" opacity="0.6"/>
  <rect x="11" y="22" width="7" height="20" rx="2" fill="#D4AF37" opacity="0.75"/>
  <rect x="22" y="14" width="7" height="28" rx="2" fill="#D4AF37" opacity="0.9"/>
  <rect x="33" y="6"  width="7" height="36" rx="2" fill="#D4AF37"/>

  <!-- Separator -->
  <line x1="54" y1="8" x2="54" y2="44" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="66" y="30"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="800"
    letter-spacing="5"
    fill="#FFFFFF">ECHELON</text>

  <!-- Tagline -->
  <text x="67" y="43"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="2.5"
    fill="rgba(255,255,255,0.35)">ONE LAYER ABOVE</text>
</svg>
